<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>程式設計與實習 - 期中整合作品集</title>
  
  <script>
    window.onerror = function(msg, url, lineNo) {
      alert("【程式語法錯誤】\n錯誤訊息：" + msg + "\n錯誤行數：第 " + lineNo + " 行");
      return false;
    };
  </script>

  <script src="https://unpkg.com/p5@1.9.0/lib/p5.min.js" onerror="alert('【載入失敗】無法下載 p5.js 函式庫！\n請檢查網路連線，或暫時關閉瀏覽器的擋廣告外掛。')"></script>
  
  <style>
    body { 
      margin: 0; 
      padding: 0; 
      overflow: hidden; 
      background-color: #0f172a; 
      color: white; 
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
    }
    #canvas-container { 
      position: absolute; 
      top: 0; 
      left: 0; 
      z-index: -1; 
    }
    #ui-container { 
      position: absolute; 
      right: 5%; 
      top: 5%; 
      width: 55%; 
      height: 85%; 
      background: rgba(255, 255, 255, 0.1); 
      backdrop-filter: blur(12px); 
      -webkit-backdrop-filter: blur(12px);
      border-radius: 20px; 
      border: 1px solid rgba(255, 255, 255, 0.2);
      padding: 30px; 
      box-shadow: 0 10px 30px rgba(0,0,0,0.5); 
      display: flex; 
      flex-direction: column; 
    }
    iframe { 
      flex-grow: 1; 
      width: 100%; 
      border: none; 
      border-radius: 12px; 
      background: #f8fafc; 
      box-shadow: inset 0 4px 6px rgba(0,0,0,0.1);
    }
    .info { margin-top: 20px; }
    h1 { margin: 0 0 15px 0; font-size: 28px; letter-spacing: 2px; text-shadow: 0 2px 4px rgba(0,0,0,0.5); }
    p { margin: 0 0 10px 0; font-size: 15px; line-height: 1.6; color: #e2e8f0; }
  </style>
</head>
<body>

  <div id="canvas-container"></div>
  
  <div id="ui-container">
    <h1>🌱 程式設計作品：時光記憶圖譜</h1>
    <p>點擊左側藤蔓上的「種子」節點，即可查看各週的作品成果與程式演進。</p>
    <iframe id="display-frame" src="about:blank" title="作品展示區"></iframe>
    <div class="info">
      <p><strong>整合展示：</strong>本網頁運用 <code>vertex</code> 繪製藤蔓與魚尾，並利用 <code>class</code> 封裝種子、海草、魚群與氣泡物件，打造完整的數位海洋生態系。</p>
    </div>
  </div>

  <script>
    let seeds = [];
    let seaweeds = [];
    let bubbles = []; 
    let fishes = [];  
    let iframeEl;
    
    let works = [
      { week: "W1", url: "https://nitattt34-boop.github.io/0309/", desc: "0309 成果展示" },
      { week: "W2", url: "https://nitattt34-boop.github.io/0316/", desc: "0316 成果展示" },
      { week: "W3", url: "https://nitattt34-boop.github.io/0323/", desc: "0323 成果展示" },
      { week: "W4-1", url: "https://nitattt34-boop.github.io/0330/", desc: "0330 成果展示" },
      { week: "W4-2", url: "https://nitattt34-boop.github.io/0331/", desc: "0331 成果展示" }
    ];

    function setup() {
      let canvas = createCanvas(windowWidth, windowHeight);
      canvas.parent('canvas-container');
      iframeEl = document.getElementById('display-frame');
      
      if(works.length > 0) {
        iframeEl.src = works[works.length - 1].url;
      }

      let startY = height * 0.85;
      let spacing = (height * 0.75) / works.length;
      for (let i = 0; i < works.length; i++) {
        let offsetX = (i % 2 === 0) ? 35 : -35; 
        let x = width * 0.2 + offsetX;
        let y = startY - i * spacing;
        seeds.push(new Seed(x, y, works[i]));
      }

      for (let i = 0; i < 18; i++) {
        let sx = random(width * 0.05, width * 0.4);
        let sh = random(120, 320);
        seaweeds.push(new Seaweed(sx, height, sh));
      }

      for (let i = 0; i < 30; i++) {
        bubbles.push(new Bubble());
      }

      for (let i = 0; i < 8; i++) {
        fishes.push(new Fish());
      }
    }

    function draw() {
      background(15, 23, 42, 70);

      for (let i = 0; i < fishes.length; i++) {
        fishes[i].update();
        fishes[i].display();
      }

      for (let i = 0; i < seaweeds.length; i++) {
        seaweeds[i].display();
      }

      for (let i = 0; i < bubbles.length; i++) {
        bubbles[i].update();
        bubbles[i].display();
      }

      noFill();
      stroke(74, 222, 128); 
      strokeWeight(4);
      beginShape();
      curveVertex(width * 0.2, height);
      curveVertex(width * 0.2, height);
      for (let i = 0; i < seeds.length; i++) {
        let mouseParallax = map(mouseX, 0, width, 20, -20);
        curveVertex(seeds[i].baseX + mouseParallax, seeds[i].baseY);
      }
      curveVertex(width * 0.2, height * 0.05);
      curveVertex(width * 0.2, height * 0.05);
      endShape();

      for (let i = 0; i < seeds.length; i++) {
        seeds[i].update();
        seeds[i].display();
      }
    }

    function mousePressed() {
      for (let i = 0; i < seeds.length; i++) {
        if (seeds[i].isHovered()) {
          iframeEl.src = seeds[i].data.url; 
          seeds[i].clickEffect();         
        }
      }
    }

    function windowResized() {
      resizeCanvas(windowWidth, windowHeight);
    }

    class Fish {
      constructor() {
        this.reset();
        this.x = random(width); 
      }
      reset() {
        this.y = random(height * 0.1, height * 0.9);
        this.size = random(12, 35); 
        this.speed = random(0.5, 2.5) * (40 / this.size); 
        this.direction = random(1) > 0.5 ? 1 : -1; 
        this.x = this.direction === 1 ? -this.size * 3 : width + this.size * 3;
        this.color = color(random(30, 100), random(100, 180), random(150, 220), 180);
      }
      update() {
        this.x += this.speed * this.direction;
        this.y += sin(frameCount * 0.02 + this.x * 0.01) * 0.5;
        if (this.direction === 1 && this.x > width + this.size * 3) this.reset();
        if (this.direction === -1 && this.x < -this.size * 3) this.reset();
      }
      display() {
        push(); 
        translate(this.x, this.y);
        if (this.direction === -1) {
          scale(-1, 1);
        }
        noStroke();
        fill(this.color);
        beginShape();
        vertex(-this.size, 0); 
        vertex(-this.size * 1.8, -this.size * 0.6); 
        vertex(-this.size * 1.4, 0); 
        vertex(-this.size * 1.8, this.size * 0.6); 
        endShape(CLOSE);
        ellipse(0, 0, this.size * 2.5, this.size * 1.2);
        fill(255, 200);
        circle(this.size * 0.6, -this.size * 0.15, this.size * 0.3);
        fill(15, 23, 42); 
        circle(this.size * 0.65, -this.size * 0.15, this.size * 0.15);
        pop(); 
      }
    }

    class Bubble {
      constructor() {
        this.x = random(width * 0.05, width * 0.6); 
        this.y = random(height, height + 500); 
        this.size = random(3, 12);
        this.speed = random(1, 3);
        this.wobbleOffset = random(TWO_PI); 
      }
      update() {
        this.y -= this.speed; 
        this.x += sin(frameCount * 0.05 + this.wobbleOffset) * 0.6; 
        if (this.y < -20) {
          this.y = height + random(20, 100);
          this.x = random(width * 0.05, width * 0.6);
        }
      }
      display() {
        noStroke();
        fill(255, 255, 255, 40); 
        circle(this.x, this.y, this.size * 2);
        fill(255, 255, 255, 80);
        circle(this.x - this.size * 0.3, this.y - this.size * 0.3, this.size * 0.5);
      }
    }

    class Seaweed {
      constructor(x, y, h) {
        this.x = x;
        this.y = y;
        this.h = h;
        this.noiseOffset = random(2000);
        this.color = color(random(20, 50), random(140, 200), random(100, 160), 100);
      }
      display() {
        noFill();
        stroke(this.color);
        strokeWeight(random(6, 12));
        beginShape();
        for (let i = 0; i <= this.h; i += 25) {
          let sway = map(noise(this.noiseOffset, frameCount * 0.012), 0, 1, -1.2, 1.2);
          let currentX = this.x + sway * (i * 0.25); 
          let currentY = this.y - i;
          curveVertex(currentX, currentY);
        }
        endShape();
        this.noiseOffset += 0.008;
      }
    }

    class Seed {
      constructor(x, y, data) {
        this.baseX = x;
        this.baseY = y;
        this.x = x;
        this.y = y;
        this.data = data;
        this.size = 28;
        this.pulse = random(TWO_PI); 
        this.defaultColor = color(56, 189, 248); 
        this.hoverColor = color(250, 204, 21);   
      }
      update() {
        let mouseParallax = map(mouseX, 0, width, 20, -20);
        this.x = this.baseX + mouseParallax;
        this.pulse += 0.06;
      }
      display() {
        let hovered = this.isHovered();
        let currentSize = hovered ? this.size * 1.35 : this.size + sin(this.pulse) * 5;
        noStroke();
        fill(186, 230, 253, 40);
        circle(this.x, this.y, currentSize * 2);
        if (hovered) {
          fill(this.hoverColor);
          cursor('pointer'); 
        } else {
          fill(this.defaultColor);
        }
        circle(this.x, this.y, currentSize);
        fill(255);
        textAlign(CENTER, CENTER);
        textSize(13);
        text(this.data.week, this.x - 50, this.y);
      }
      isHovered() {
        return dist(mouseX, mouseY, this.x, this.y) < this.size;
      }
      clickEffect() {
        this.size = 45;
        setTimeout(() => { this.size = 28; }, 200);
      }
    }
  </script>
</body>
</html>
